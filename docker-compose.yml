services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: win-marketplace-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-win_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - win-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Aplicação Spring Boot (Backend)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: win-marketplace-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-win_marketplace}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-update}
      TZ: ${TZ:-America/Sao_Paulo}
      
      # Configuração CORS (adicione seus IPs/domínios separados por vírgula)
      # Inclui localhost, IP do VPS com e sem porta, e variações comuns
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://137.184.87.106:3000,http://137.184.87.106,http://137.184.87.106:80,https://winmarketplace.com.br,http://winmarketplace.com.br}
      
      # ========================================
      # Configurações de Email
      # ========================================
      # OPÇÃO 1: Gmail (Desenvolvimento)
      # Descomente e preencha:
      # MAIL_HOST: smtp.gmail.com
      # MAIL_PORT: 587
      # MAIL_USERNAME: seu-email@gmail.com
      # MAIL_PASSWORD: sua-senha-app-16-caracteres
      # MAIL_FROM: seu-email@gmail.com
      
      # OPÇÃO 2: SendGrid (Recomendado - Produção)
      # Descomente e preencha após criar conta em https://signup.sendgrid.com/
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-apikey}
      MAIL_PASSWORD: ${SENDGRID_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      
      # Dev Tools (gerador de hash de senha)
      DEV_TOOLS_ENABLED: ${DEV_TOOLS_ENABLED:-true}
      
      # ========================================
      # Mercado Pago Configuration
      # ========================================
      # Obtenha seu Access Token em: https://www.mercadopago.com.br/developers/panel/app
      # Crie uma aplicação > Credenciais > Access Token (Produção ou Teste)
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - win-network
    restart: unless-stopped

  # Frontend React/Vite
  frontend:
    build:
      context: ./win-frontend
      dockerfile: Dockerfile
    container_name: win-marketplace-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://137.184.87.106:8080}
      NODE_ENV: ${NODE_ENV:-production}
      # Mercado Pago Public Key (para o SDK React)
      VITE_MERCADOPAGO_PUBLIC_KEY: ${VITE_MERCADOPAGO_PUBLIC_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - win-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  win-network:
    driver: bridge