services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: win-marketplace-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-win_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/otimizacao_indices.sql:/docker-entrypoint-initdb.d/otimizacao_indices.sql
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - win-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'      # Limitar PostgreSQL a 0.5 vCPU (25% das 2 vCPUs)
          memory: 1G       # Limitar memória a 1GB
        reservations:
          cpus: '0.25'     # Reservar 0.25 vCPU garantida
          memory: 256M     # Reservar 256MB garantidos

  # Aplicação Spring Boot (Backend)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: win-marketplace-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-win_marketplace}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-update}
      TZ: ${TZ:-America/Sao_Paulo}
      
      # Otimizações JVM para produção (VPS 2vCPU/4GB)
      JAVA_OPTS: "-Xms512m -Xmx1536m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:+OptimizeStringConcat -Djava.awt.headless=true"
      
      # Configuração CORS (adicione seus IPs/domínios separados por vírgula)
      # Inclui localhost, IP do VPS com e sem porta, e variações comuns
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost:3000,https://localhost:5173,https://127.0.0.1:3000,https://137.184.87.106:3000,https://137.184.87.106,https://137.184.87.106:80,https://winmarketplace.com.br,http://winmarketplace.com.br}
      
      # ========================================
      # Configurações de Email
      # ========================================
      # OPÇÃO 1: Gmail (Desenvolvimento)
      # Descomente e preencha:
      # MAIL_HOST: smtp.gmail.com
      # MAIL_PORT: 587
      # MAIL_USERNAME: seu-email@gmail.com
      # MAIL_PASSWORD: sua-senha-app-16-caracteres
      # MAIL_FROM: seu-email@gmail.com
      
      # OPÇÃO 2: SendGrid (Recomendado - Produção)
      # Descomente e preencha após criar conta em https://signup.sendgrid.com/
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-apikey}
      MAIL_PASSWORD: ${SENDGRID_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      
      # Dev Tools (gerador de hash de senha)
      DEV_TOOLS_ENABLED: ${DEV_TOOLS_ENABLED:-false}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_LOGIN_MAX_ATTEMPTS: ${SECURITY_LOGIN_MAX_ATTEMPTS:-5}
      SECURITY_LOGIN_LOCK_MINUTES: ${SECURITY_LOGIN_LOCK_MINUTES:-15}
      
      # ========================================
      # Mercado Pago Configuration
      # ========================================
      # Obtenha seu Access Token em: https://www.mercadopago.com.br/developers/panel/app
      # Crie uma aplicação > Credenciais > Access Token (Produção ou Teste)
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      
      # ========================================
      # Pagar.me (Stone) Configuration
      # ========================================
      # Obtenha suas credenciais em: https://dashboard.pagar.me/
      # API Dashboard > Configurações > Chaves de API
      # Para teste, use as chaves de teste (sk_test_...)
      # Para produção, use as chaves de produção (sk_live_...)
      PAGARME_API_KEY: ${PAGARME_API_KEY:-}
      PAGARME_PUBLIC_KEY: ${PAGARME_PUBLIC_KEY:-}
      PAGARME_ENABLED: ${PAGARME_ENABLED:-false}
      PAGARME_ENVIRONMENT: ${PAGARME_ENVIRONMENT:-test}
      
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # ========================================
      # Storage Configuration
      # ========================================
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      
      # S3/Spaces Configuration (mapeia para app.storage.s3.*)
      AWS_ACCESS_KEY_ID: ${SPACES_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${SPACES_SECRET_KEY:-}
      AWS_REGION: ${SPACES_REGION:-sfo3}
      S3_BUCKET_NAME: ${SPACES_BUCKET_NAME:-win-marketplace-storage}
      S3_ENDPOINT: ${SPACES_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      
      # ========================================
      # DigitalOcean Spaces Configuration (mantido para compatibilidade)
      # ========================================
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY:-}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY:-}
      SPACES_BUCKET_NAME: ${SPACES_BUCKET_NAME:-win-marketplace-storage}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
      SPACES_REGION: ${SPACES_REGION:-sfo3}
      
      # ========================================
      # ========================================
      # Uber Direct API - INTEGRAÇÃO REAL
      # ========================================
      # Obtenha credenciais em: https://developer.uber.com/
      # Para Sandbox: https://sandbox-api.uber.com
      # Para Produção: https://api.uber.com
      UBER_CLIENT_ID: ${UBER_CLIENT_ID}
      UBER_CLIENT_SECRET: ${UBER_CLIENT_SECRET}
      UBER_API_BASE_URL: ${UBER_API_BASE_URL:-https://sandbox-api.uber.com}
      UBER_API_ENABLED: ${UBER_API_ENABLED:-true}
      
      # ========================================
      # Google Maps API (para geocodificação)
      # ========================================
      Maps_API_KEY: ${Maps_API_KEY:-}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - win-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.25'     # Limitar backend a 1.25 vCPU (62.5% das 2 vCPUs)
          memory: 2G       # Limitar memória a 2GB
        reservations:
          cpus: '0.5'      # Reservar 0.5 vCPU garantida
          memory: 768M     # Reservar 768MB garantidos

  # Frontend React/Vite
  frontend:
    build:
      context: ./win-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://winmarketplace.com.br:8080}
    container_name: win-marketplace-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://winmarketplace.com.br:8080}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - win-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  win-network:
    driver: bridge