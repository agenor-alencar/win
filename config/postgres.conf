# =====================================================================
# PostgreSQL Configuration - Otimizado para VPS 2vCPU/4GB RAM
# =====================================================================
# Aplicado via docker-compose.yml
# Data: 11 de dezembro de 2025
# =====================================================================

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE MEMÓRIA
# ---------------------------------------------------------------------

# shared_buffers: Memória compartilhada para cache de dados
# Recomendação: 25% da RAM total (4GB) = 1GB
# Para containers, usar valor conservador
shared_buffers = 768MB

# effective_cache_size: Estimativa de memória disponível para cache do SO
# Recomendação: 50-75% da RAM total
# Ajuda o planejador de queries a decidir se deve usar índices
effective_cache_size = 2GB

# work_mem: Memória para operações de sort/hash por conexão
# Valor muito alto pode causar OOM se muitas conexões simultâneas
# Cálculo: (RAM - shared_buffers) / max_connections / 2
# (4GB - 768MB) / 100 / 2 ≈ 16MB (usando valor conservador)
work_mem = 16MB

# maintenance_work_mem: Memória para operações de manutenção
# (VACUUM, CREATE INDEX, ALTER TABLE)
# Recomendação: 5-10% da RAM
maintenance_work_mem = 256MB

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE CONEXÕES
# ---------------------------------------------------------------------

# max_connections: Número máximo de conexões simultâneas
# Valor padrão: 100
# Para aplicação com pool de 10 conexões (HikariCP), valor é suficiente
max_connections = 100

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE CHECKPOINT (Write-Ahead Log)
# ---------------------------------------------------------------------

# wal_buffers: Buffer para WAL (Write-Ahead Log)
# Recomendação: -1 (auto, geralmente 1/32 de shared_buffers)
# Ou valor fixo entre 16MB-64MB
wal_buffers = 16MB

# checkpoint_completion_target: Meta de tempo para completar checkpoint
# Valor entre 0.5-0.9 (0.9 = usar 90% do tempo entre checkpoints)
# Reduz picos de I/O
checkpoint_completion_target = 0.9

# max_wal_size: Tamanho máximo do WAL antes de forçar checkpoint
# Valor maior = menos checkpoints, mas recuperação mais lenta
# Recomendação: 1-2GB para produção
max_wal_size = 1GB

# min_wal_size: Tamanho mínimo do WAL para reciclar
min_wal_size = 256MB

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE QUERY PLANNER
# ---------------------------------------------------------------------

# random_page_cost: Custo estimado de leitura aleatória vs sequencial
# SSD: 1.1-1.5, HDD: 4.0
# DigitalOcean usa SSD, então valor baixo
random_page_cost = 1.1

# effective_io_concurrency: Número de operações de I/O simultâneas
# SSD: 200, HDD: 2
effective_io_concurrency = 200

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE LOGGING (Otimizadas para produção)
# ---------------------------------------------------------------------

# Reduzir logging para diminuir I/O
logging_collector = on
log_destination = 'stderr'

# Logar apenas queries lentas (> 1 segundo)
log_min_duration_statement = 1000

# Não logar todas as queries (desempenho)
log_statement = 'none'

# Logar checkpoints para monitorar I/O
log_checkpoints = on

# Logar conexões/desconexões para debug
log_connections = off
log_disconnections = off

# Formato de log com timestamp
log_line_prefix = '%m [%p] %u@%d '

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE AUTOVACUUM (Limpeza automática)
# ---------------------------------------------------------------------

# Habilitar autovacuum (recomendado)
autovacuum = on

# Tornar autovacuum mais agressivo para evitar bloat
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# Threshold para iniciar autovacuum
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE TIMEOUT
# ---------------------------------------------------------------------

# statement_timeout: Timeout de query (0 = desabilitado)
# Usar valor alto para não interromper operações legítimas
statement_timeout = 300000  # 5 minutos

# lock_timeout: Timeout de lock (0 = desabilitado)
lock_timeout = 30000  # 30 segundos

# idle_in_transaction_session_timeout: Timeout de transação ociosa
# Evita conexões travadas
idle_in_transaction_session_timeout = 60000  # 1 minuto

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE LOCALIZAÇÃO
# ---------------------------------------------------------------------

# Timezone
timezone = 'America/Sao_Paulo'
log_timezone = 'America/Sao_Paulo'

# Encoding
client_encoding = 'UTF8'

# Locale (usar en_US.utf8 para melhor performance)
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE EXTENSÕES
# ---------------------------------------------------------------------

# Habilitar extensões comuns
# shared_preload_libraries = 'pg_stat_statements'

# ---------------------------------------------------------------------
# CONFIGURAÇÕES DE SEGURANÇA
# ---------------------------------------------------------------------

# Permitir conexões de qualquer host (Docker network)
listen_addresses = '*'

# Porta padrão
port = 5432

# Máximo de arquivos abertos
max_files_per_process = 1000

# ---------------------------------------------------------------------
# FIM DA CONFIGURAÇÃO
# =====================================================================
# Aplicar mudanças: docker compose down && docker compose up -d --force-recreate
# Verificar logs: docker logs win-marketplace-db
# Monitorar performance: docker stats
# =====================================================================
