<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN Validation Test - WIN Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .section {
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        
        .field-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 3px;
            font-size: 0.85em;
            text-transform: uppercase;
        }
        
        .field-value {
            padding: 8px;
            border-radius: 3px;
            font-family: monospace;
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .badge-connected {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge-action {
            background: #fff3cd;
            color: #856404;
        }
        
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-right: 5px;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .modal-container {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .pin-input {
            font-size: 2em;
            letter-spacing: 10px;
            text-align: center;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        
        .pin-info {
            font-size: 0.85em;
            color: #666;
            margin: 10px 0;
        }
        
        .error-msg {
            color: #dc3545;
            font-size: 0.85em;
            margin: 10px 0;
            padding: 8px;
            background: #f8d7da;
            border-radius: 3px;
            display: none;
        }
        
        .error-msg.active {
            display: block;
        }
        
        .success-msg {
            color: #155724;
            font-size: 0.85em;
            margin: 10px 0;
            padding: 8px;
            background: #d4edda;
            border-radius: 3px;
            display: none;
        }
        
        .success-msg.active {
            display: block;
        }
        
        .log-container {
            border: 1px solid #ddd;
            border-radius: 5px;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            font-size: 0.85em;
            font-family: monospace;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #667eea;
            background: white;
        }
        
        .time {
            color: #999;
            font-size: 0.75em;
        }
        
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 PIN Validation Test</h1>
            <p>Teste de validação de PIN via WebSocket</p>
        </header>
        
        <div class="main">
            <!-- Painel de Controle -->
            <div class="card">
                <h2>🎮 Controle</h2>
                
                <div class="section">
                    <div class="field-label">Status Conexão</div>
                    <span class="status-badge badge-disconnected" id="connStatus">❌ Desconectado</span>
                </div>
                
                <div class="section">
                    <div class="field-label">Entrega ID</div>
                    <div class="field-value">787ce2ee-d454-47a7-8dbf-e505cd165ba1</div>
                </div>
                
                <div class="section">
                    <div class="field-label">Action Recebida</div>
                    <div class="field-value" id="actionType">-</div>
                </div>
                
                <div class="section">
                    <div class="field-label">PIN Code (do servidor)</div>
                    <div class="field-value" id="pinCodeFromServer">-</div>
                </div>
                
                <div class="section">
                    <button class="btn btn-primary" onclick="connectWebSocket()" id="connectBtn">Conectar WebSocket</button>
                    <button class="btn btn-secondary" onclick="disconnectWebSocket()" id="disconnectBtn" disabled>Desconectar</button>
                </div>
                
                <div class="section">
                    <button class="btn btn-primary" onclick="showPinModal()" id="showModalBtn" disabled>Mostrar Modal PIN</button>
                </div>
            </div>
            
            <!-- Log de Eventos -->
            <div class="card">
                <h2>📋 Log de Eventos</h2>
                <div class="log-container" id="logContainer"></div>
                <button class="btn btn-secondary" onclick="clearLog()">Limpar Log</button>
            </div>
        </div>
    </div>
    
    <!-- Modal de PIN -->
    <div class="modal-container" id="pinModalContainer">
        <div class="modal">
            <h3>🔐 Validar PIN</h3>
            <p class="pin-info">Digite o código PIN de 4 dígitos:</p>
            
            <input type="text" class="pin-input" id="pinInput" 
                   maxlength="4" placeholder="0000" 
                   inputmode="numeric"
                   onkeyup="handlePinInput(event)">
            
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            
            <div style="margin-top: 15px;">
                <button class="btn btn-primary" onclick="submitPin()">Validar PIN</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script>
        let stompClient = null;
        let deliveryId = '787ce2ee-d454-47a7-8dbf-e505cd165ba1';
        let receivedPin = null;
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString('pt-BR');
            const icon = {
                info: 'ℹ️',
                action: '⚠️',
                success: '✅',
                error: '❌'
            }[type] || 'ℹ️';
            
            entry.innerHTML = `<span class="time">${time}</span> ${icon} ${message}`;
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            if (logContainer.children.length > 20) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        
        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }
        
        function connectWebSocket() {
            log('Conectando ao WebSocket...');
            
            const socket = new SockJS('http://localhost:8080/ws/connect');
            stompClient = Stomp.over(socket);
            stompClient.debug = () => {};
            
            stompClient.connect(
                {},
                () => {
                    log('✅ WebSocket conectado', 'success');
                    updateConnectionStatus(true);
                    
                    // Escutar ações requeridas (PIN)
                    stompClient.subscribe(`/topic/entrega/${deliveryId}/action`, (msg) => {
                        const data = JSON.parse(msg.body);
                        handleActionMessage(data);
                    });
                    
                    document.getElementById('disconnectBtn').disabled = false;
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('showModalBtn').disabled = false;
                },
                (error) => {
                    log(`❌ Erro de conexão: ${error}`, 'error');
                    updateConnectionStatus(false);
                }
            );
        }
        
        function disconnectWebSocket() {
            if (stompClient) {
                stompClient.disconnect(() => {
                    log('Desconectado', 'info');
                    updateConnectionStatus(false);
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('showModalBtn').disabled = true;
                });
            }
        }
        
        function updateConnectionStatus(connected) {
            const badge = document.getElementById('connStatus');
            if (connected) {
                badge.textContent = '✅ Conectado';
                badge.className = 'status-badge badge-connected';
            } else {
                badge.textContent = '❌ Desconectado';
                badge.className = 'status-badge badge-disconnected';
            }
        }
        
        function handleActionMessage(data) {
            log(`Evento ACTION recebido: ${data.tipo}`, 'action');
            log(`Ação: ${data.acao}`, 'action');
            
            document.getElementById('actionType').textContent = data.acao;
            
            if (data.pinCode) {
                receivedPin = data.pinCode;
                document.getElementById('pinCodeFromServer').textContent = data.pinCode;
                log(`🔑 PIN recebido do servidor: ${data.pinCode}`, 'action');
                log(`Use este PIN no modal para validar`, 'info');
            }
        }
        
        function showPinModal() {
            document.getElementById('pinModalContainer').style.display = 'flex';
            document.getElementById('pinInput').focus();
            log('Modal de PIN exibido', 'info');
        }
        
        function closeModal() {
            document.getElementById('pinModalContainer').style.display = 'none';
            document.getElementById('pinInput').value = '';
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('successMsg').classList.remove('active');
        }
        
        function handlePinInput(e) {
            // Apenas números
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
        }
        
        function submitPin() {
            const pin = document.getElementById('pinInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.classList.remove('active');
            successMsg.classList.remove('active');
            
            if (pin.length < 4) {
                errorMsg.textContent = 'PIN deve ter 4 dígitos';
                errorMsg.classList.add('active');
                return;
            }
            
            if (pin === receivedPin) {
                log(`✅ PIN validado com sucesso!`, 'success');
                successMsg.textContent = '✅ PIN validado com sucesso!';
                successMsg.classList.add('active');
                
                setTimeout(() => {
                    closeModal();
                }, 2000);
            } else {
                log(`❌ PIN incorreto. Esperado: ${receivedPin}, Recebido: ${pin}`, 'error');
                errorMsg.textContent = `❌ PIN incorreto. Tente novamente.`;
                errorMsg.classList.add('active');
            }
        }
        
        // Auto-connect on load
        window.addEventListener('load', () => {
            log('Página carregada. Clique em "Conectar WebSocket"');
        });
    </script>
</body>
</html>
