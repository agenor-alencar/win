# Configuração para DigitalOcean Spaces
# Use este perfil em produção: java -jar app.jar --spring.profiles.active=digitalocean

spaces:
  # Chaves de acesso do DigitalOcean Spaces (obtenha em: https://cloud.digitalocean.com/account/api/tokens)
  access:
    key: ${SPACES_ACCESS_KEY}
  secret:
    key: ${SPACES_SECRET_KEY}
  
  # Nome do bucket (Space)
  bucket:
    name: ${SPACES_BUCKET_NAME:win-marketplace-storage}
  
  # Endpoint regional (sfo3 = San Francisco 3, nyc3 = New York 3, etc)
  endpoint: ${SPACES_ENDPOINT:https://sfo3.digitaloceanspaces.com}
  
  # Região do datacenter
  region: ${SPACES_REGION:sfo3}
