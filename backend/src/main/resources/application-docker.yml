spring:
  application:
    name: win-marketplace
  
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/win_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: none  # ✅ Desabilita validação estrita - deixa Flyway gerenciar schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Desabilitar RSocket auto-config (causando erro de authenticationManager null)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.rsocket.RSocketMessagingAutoConfiguration

# DigitalOcean Spaces Configuration (opcional)
# Para habilitar, configure as variáveis de ambiente:
# SPACES_ACCESS_KEY e SPACES_SECRET_KEY
spaces:
  access:
    key: ${SPACES_ACCESS_KEY:}
  secret:
    key: ${SPACES_SECRET_KEY:}
  bucket:
    name: ${SPACES_BUCKET_NAME:win-marketplace-storage}
  endpoint: ${SPACES_ENDPOINT:https://sfo3.digitaloceanspaces.com}
  region: ${SPACES_REGION:sfo3}

server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: never

logging:
  level:
    root: INFO
    com.win.marketplace: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG