spring:
  application:
    name: win-marketplace
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/win_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000  # 30s para obter conexão do pool
      idle-timeout: 120000  # 2 minutos - tempo que conexão ociosa fica no pool
      max-lifetime: 240000  # 4 minutos - tempo máximo de vida da conexão (menor que idle timeout do PostgreSQL)
      keepalive-time: 60000  # 1 minuto - ping de keepalive para manter conexões vivas
      connection-test-query: SELECT 1  # Query para testar conexões
      validation-timeout: 5000  # 5s timeout de validação
      leak-detection-threshold: 60000  # Detectar vazamento após 60s
      auto-commit: true
      pool-name: HikariPool-WinMarketplace
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}  # ✅ FIX-002: Environment-aware DDL strategy (update para criar tabelas automáticamente)
    show-sql: false  # Desabilitado para produção (reduz CPU)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # Desabilitado para produção
        use_sql_comments: false  # Desabilitado para produção
        jdbc:
          time_zone: America/Sao_Paulo
          batch_size: 20  # Batch para operações em lote
          statement_fetch_size: 50  # ✅ PERF-001: Fetch size otimizado
        order_inserts: true  # Otimização para inserts
        order_updates: true  # Otimização para updates
        enable_lazy_load_no_trans: false  # ✅ FIX-003: Garante transação explícita
        temp:
          use_jdbc_metadata_defaults: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: always  # ✅ Executa scripts SQL na inicialização
      continue-on-error: false
  
  # Configurações de Email (JavaMailSender)
  # Suporta Gmail e SendGrid através de variáveis de ambiente
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: ${MAIL_FROM:noreply@winmarketplace.com}  # Email remetente
    test-connection: false  # Não falhar se email não configurado
    
  # SendGrid Configuration (alternativa ao Gmail)
  # Para usar SendGrid, defina:
  #   MAIL_HOST=smtp.sendgrid.net
  #   MAIL_PORT=587
  #   MAIL_USERNAME=apikey
  #   MAIL_PASSWORD=SG.sua-api-key-aqui
  #   MAIL_FROM=seu-email-verificado@gmail.com

server:
  port: 8080

# Configurações da aplicação
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:}
  dev-tools:
    enabled: ${DEV_TOOLS_ENABLED:false}  # true apenas em dev/staging, NUNCA em produção
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}
  upload:
    dir: ${user.dir}/uploads/produtos
    base-url: ${UPLOAD_BASE_URL:http://localhost:${server.port}/uploads/produtos}
  gtin-api:
    url: ${GTIN_API_URL:https://api.cosmos.bluesoft.com.br/gtins}
    token: ${GTIN_API_TOKEN:}  # Token de autenticação da API GTIN (opcional)
  external:
    receitaws:
      base-url: ${RECEITAWS_BASE_URL:https://receitaws.com.br/v1/cnpj}
    viacep:
      base-url: ${VIACEP_BASE_URL:https://viacep.com.br/ws}
  encryption:
    secret: ${APP_ENCRYPTION_SECRET:}
  # Configurações de S3/Cloud Storage
  storage:
    type: ${STORAGE_TYPE:local}  # local, s3, digitalocean, gcs
    s3:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region: ${AWS_REGION:sa-east-1}
      bucket: ${S3_BUCKET_NAME:win-marketplace-images}
      endpoint: ${S3_ENDPOINT:}  # Para DigitalOcean Spaces ou MinIO
      public-url: ${S3_PUBLIC_URL:}  # URL pública do CDN (opcional)
    image:
      max-size-mb: 10
      allowed-types: jpg,jpeg,png,webp,gif
      thumbnail-width: 300
  
  # ✅ Google Cloud Geocoding
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  
  # ✅ Uber Direct API
  uber:
    direct:
      oauth-url: ${UBER_OAUTH_URL:https://auth.uber.com/oauth/v2/token}
      api-base-url: ${UBER_API_BASE_URL:https://api.uber.com/v1/customers}
      customer-id: ${UBER_CUSTOMER_ID:}
      client-id: ${UBER_CLIENT_ID:}
      client-secret: ${UBER_CLIENT_SECRET:}
      webhook-secret: ${UBER_WEBHOOK_SECRET:}
      thumbnail-height: 300
      medium-width: 800
      medium-height: 800

# Uber Direct API Configuration
uber:
  client:
    id: ${UBER_CLIENT_ID:}
    secret: ${UBER_CLIENT_SECRET:}
  api:
    base-url: ${UBER_API_BASE_URL:https://api.uber.com}
    enabled: ${UBER_API_ENABLED:false}  # true para usar API real, false para modo MOCK
  webhook:
    secret: ${UBER_WEBHOOK_SECRET:}  # Secret para validação HMAC de webhooks

# Pagar.me (Stone) Configuration
pagarme:
  api-key: ${PAGARME_API_KEY:}
  public-key: ${PAGARME_PUBLIC_KEY:}
  environment: ${PAGARME_ENVIRONMENT:test}  # test ou live
  enabled: ${PAGARME_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

security:
  login:
    max-attempts: ${SECURITY_LOGIN_MAX_ATTEMPTS:5}
    lock-minutes: ${SECURITY_LOGIN_LOCK_MINUTES:15}
    use-redis: ${SECURITY_LOGIN_USE_REDIS:true}

# ✅ TWILIO SMS CONFIGURATION
twilio:
  enabled: false
  account-sid: ${TWILIO_ACCOUNT_SID:}  # Account SID do Twilio
  auth-token: ${TWILIO_AUTH_TOKEN:}    # Auth Token do Twilio
  phone-number: ${TWILIO_PHONE_NUMBER:}  # Número de telefone Twilio para enviar SMS (ex: +5511999999999)

# ✅ OTP (One-Time Password) CONFIGURATION
otp:
  expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}  # Tempo de expiração do código OTP
  max-attempts: ${OTP_MAX_ATTEMPTS:3}  # Máximo de tentativas de validação

# ✅ SMS RATE LIMITING CONFIGURATION
sms:
  ratelimit:
    max-requests: ${SMS_RATELIMIT_MAX_REQUESTS:3}  # Máximo de requisições por SMS
    window-minutes: ${SMS_RATELIMIT_WINDOW_MINUTES:1}  # Janela de tempo (em minutos)
    block-minutes: ${SMS_RATELIMIT_BLOCK_MINUTES:1}  # Tempo de bloqueio (em minutos)

logging:
  level:
    root: WARN  # Reduzido para produção
    com.win.marketplace: INFO  # Mantém logs da aplicação
    org.springframework.web: WARN  # Reduzido
    org.hibernate.SQL: WARN  # Desabilitado SQL logging
    org.hibernate.type.descriptor.sql.BasicBinder: WARN  # Desabilitado
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

# ✅ Scheduler Configuration (para limpeza de tokens e tarefas agendadas)
scheduler:
  initial-delay: 5000  # 5 segundos (atraso inicial para startup)
  fixed-delay: 86400000  # 24 horas entre execuções de validação