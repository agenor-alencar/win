spring:
  application:
    name: win-marketplace
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/win_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000  # 30s para obter conexão do pool
      idle-timeout: 120000  # 2 minutos - tempo que conexão ociosa fica no pool
      max-lifetime: 240000  # 4 minutos - tempo máximo de vida da conexão (menor que idle timeout do PostgreSQL)
      keepalive-time: 60000  # 1 minuto - ping de keepalive para manter conexões vivas
      connection-test-query: SELECT 1  # Query para testar conexões
      validation-timeout: 5000  # 5s timeout de validação
      leak-detection-threshold: 60000  # Detectar vazamento após 60s
      auto-commit: true
      pool-name: HikariPool-WinMarketplace
  
  jpa:
    hibernate:
      ddl-auto: update  # ✅ Cria/atualiza tabelas automaticamente
    show-sql: false  # Desabilitado para produção (reduz CPU)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # Desabilitado para produção
        use_sql_comments: false  # Desabilitado para produção
        jdbc:
          time_zone: America/Sao_Paulo
          batch_size: 20  # Batch para operações em lote
        order_inserts: true  # Otimização para inserts
        order_updates: true  # Otimização para updates
        temp:
          use_jdbc_metadata_defaults: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: always  # ✅ Executa scripts SQL na inicialização
      continue-on-error: false
  
  # Configurações de Email (JavaMailSender)
  # Suporta Gmail e SendGrid através de variáveis de ambiente
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: ${MAIL_FROM:noreply@winmarketplace.com}  # Email remetente
    test-connection: false  # Não falhar se email não configurado
    
  # SendGrid Configuration (alternativa ao Gmail)
  # Para usar SendGrid, defina:
  #   MAIL_HOST=smtp.sendgrid.net
  #   MAIL_PORT=587
  #   MAIL_USERNAME=apikey
  #   MAIL_PASSWORD=SG.sua-api-key-aqui
  #   MAIL_FROM=seu-email-verificado@gmail.com

server:
  port: 8080

# Configurações da aplicação
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  dev-tools:
    enabled: ${DEV_TOOLS_ENABLED:false}  # true apenas em dev/staging, NUNCA em produção
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}
  upload:
    dir: ${user.dir}/uploads/produtos
  gtin-api:
    url: ${GTIN_API_URL:https://api.cosmos.bluesoft.com.br/gtins}
    token: ${GTIN_API_TOKEN:}  # Token de autenticação da API GTIN (opcional)
  encryption:
    secret: ${APP_ENCRYPTION_SECRET:}
  # Configurações de S3/Cloud Storage
  storage:
    type: ${STORAGE_TYPE:local}  # local, s3, digitalocean, gcs
    s3:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region: ${AWS_REGION:sa-east-1}
      bucket: ${S3_BUCKET_NAME:win-marketplace-images}
      endpoint: ${S3_ENDPOINT:}  # Para DigitalOcean Spaces ou MinIO
      public-url: ${S3_PUBLIC_URL:}  # URL pública do CDN (opcional)
    image:
      max-size-mb: 10
      allowed-types: jpg,jpeg,png,webp,gif
      thumbnail-width: 300
      thumbnail-height: 300
      medium-width: 800
      medium-height: 800

# Uber Direct API Configuration
uber:
  client:
    id: ${UBER_CLIENT_ID:}
    secret: ${UBER_CLIENT_SECRET:}
  api:
    base-url: ${UBER_API_BASE_URL:https://api.uber.com}
    enabled: ${UBER_API_ENABLED:false}  # true para usar API real, false para modo MOCK
  webhook:
    secret: ${UBER_WEBHOOK_SECRET:}  # Secret para validação HMAC de webhooks

# Pagar.me (Stone) Configuration
pagarme:
  api-key: ${PAGARME_API_KEY:}
  public-key: ${PAGARME_PUBLIC_KEY:}
  environment: ${PAGARME_ENVIRONMENT:test}  # test ou live
  enabled: ${PAGARME_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

security:
  login:
    max-attempts: ${SECURITY_LOGIN_MAX_ATTEMPTS:5}
    lock-minutes: ${SECURITY_LOGIN_LOCK_MINUTES:15}

logging:
  level:
    root: WARN  # Reduzido para produção
    com.win.marketplace: INFO  # Mantém logs da aplicação
    org.springframework.web: WARN  # Reduzido
    org.hibernate.SQL: WARN  # Desabilitado SQL logging
    org.hibernate.type.descriptor.sql.BasicBinder: WARN  # Desabilitado
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false