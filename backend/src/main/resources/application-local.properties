# ===================================================================
# Configuração LOCAL (sem Docker)
# Use este perfil ao rodar o backend localmente
# Comando: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# ===================================================================

# ===================================================================
# Configuração do Banco de Dados PostgreSQL (Local)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/win_marketplace
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# Configuração do JPA e Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# Configuração do Flyway (opcional)
# ===================================================================
spring.flyway.enabled=false

# ===================================================================
# Configuração de Upload de Arquivos
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=${user.dir}/uploads/produtos
app.upload.base-url=http://localhost:8080/uploads/produtos

# ===================================================================
# Configuração do Servidor
# ===================================================================
server.port=8080

# ===================================================================
# Logging
# ===================================================================
logging.level.root=INFO
logging.level.com.win.marketplace=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# Configuração de Segurança
# ===================================================================
app.dev-tools.enabled=true
app.api-docs.enabled=true
app.frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173

# JWT Configuration
jwt.secret=9f4b8c1d7e2a6f3c8b1d5e7a9c2f4b6d8e1a3c5f7b9d2e4a6c8f1b3d5e7a9c2f

# Security
security.login.max-attempts=5
security.login.lock-minutes=15
security.login.use-redis=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# Email Configuration (SendGrid)
# ===================================================================
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=SG.test-key
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.from=noreply@winmarketplace.com

