# ===================================================================
# Configuração DOCKER/PRODUÇÃO (Container Docker)
# Profile usado em produção no Docker Compose
# ===================================================================

# ===================================================================
# 🎯 LOGGING OTIMIZADO PARA PRODUÇÃO
# ===================================================================
# Desabilita SQL logging completamente para reduzir CPU
logging.level.root=WARN
logging.level.com.win.marketplace=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.zaxxer.hikari.pool=WARN

# ===================================================================
# 📊 JPA/HIBERNATE - Produção
# ===================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.generate_statistics=false
# Desabilita acesso a metadados JDBC para evitar EOFException
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
# Desabilita validação de schema no startup
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.jakarta.persistence.validation.mode=none
# Evita problema de metadados de foreign keys
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ===================================================================
# 🔄 HikariCP - Otimizado para PostgreSQL no Docker
# ===================================================================
# PostgreSQL no Docker tem idle_in_transaction_session_timeout = 5min (300s)
# Configuramos maxLifetime para 4min (240s) - 20% abaixo do timeout do PG
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=40000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=-1

# ===================================================================
# 🌐 CORS - Múltiplos domínios permitidos
# ===================================================================
# Configurado via variável de ambiente ALLOWED_ORIGINS no docker-compose.yml
