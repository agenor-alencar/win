name: WIN Backend CI/CD Deploy

# O gatilho: Só roda quando você faz push na branch 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v3

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar o projeto com Maven (Gera o arquivo .jar)
        run: mvn clean package -DskipTests # Remova o -DskipTests no futuro para obrigar a rodar os testes

      - name: 4. Login no GitHub Container Registry (Segurança)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build e Push da Imagem Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/win-backend:latest

      - name: 6. Deploy Seguro no Servidor DigitalOcean
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            # Entra na pasta do projeto no servidor
            cd /caminho/do/seu/projeto/win
            
            # Faz o login do servidor no repositório privado do GitHub
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Baixa a nova versão recém compilada
            docker pull ghcr.io/${{ github.repository }}/win-backend:latest
            
            # Reinicia o container sem tempo de inatividade (Zero Downtime)
            docker-compose up -d --build
            
            # Limpa imagens antigas para não lotar o disco do servidor
            docker image prune -f