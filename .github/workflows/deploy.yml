name: WIN Backend CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v3

      - name: 2. Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar o projeto com Maven (Gera o arquivo .jar)
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: 4. Login no GitHub Container Registry (Segurança)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build e Push da Imagem Docker
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/win-backend:latest

      - name: 6. Deploy Seguro no Servidor DigitalOcean
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e  # Parar em caso de erro
            
            # Navegar para diretório do projeto
            cd /root/win
            echo "📂 Diretório de trabalho: $(pwd)"
            
            # Sincronizar repositório com as mudanças (docker-compose.yml, etc)
            echo "🔄 Sincronizando repositório..."
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Repositório sincronizado"
            
            # Fazer login no GitHub Container Registry
            echo "🔐 Fazendo login no GitHub Container Registry..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "✅ Login realizado"
            
            # Puxar imagem mais recente do backend
            echo "📥 Puxando imagem Docker mais recente..."
            docker pull ghcr.io/${{ github.repository }}/win-backend:latest
            echo "✅ Imagem puxada"
            
            # Parar containers antigos (se houver) e iniciar novos
            echo "🔄 Reiniciando containers com docker-compose..."
            docker-compose down || true
            docker-compose up -d --build
            echo "✅ Containers iniciados"
            
            # Aguardar backend ficar saudável
            echo "⏳ Aguardando backend ficar saudável..."
            sleep 15
            docker-compose ps
            
            # Limpar imagens antigas
            echo "🧹 Limpando imagens Docker antigas..."
            docker image prune -f
            echo "✅ Limpeza concluída"
            
            # Validar que o backend está rodando
            echo "🔍 Validando backend..."
            docker logs win-marketplace-backend 2>&1 | grep -i "started\|healthy" | tail -3
            echo "✅ Deploy concluído com sucesso!"