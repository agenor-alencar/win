name: WIN Backend CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v3

      - name: 2. Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar o projeto com Maven (Gera o arquivo .jar)
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: 4. Login no GitHub Container Registry (Segurança)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build e Push da Imagem Docker
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/win-backend:latest

      - name: 6. Copiar arquivos de configuração para VPS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,scripts/"
          target: "/root/win/"

      - name: 7. Deploy Seguro no Servidor DigitalOcean
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/win
            docker login ghcr.io -u ${{ github.actor }} --password <<< "${{ secrets.GITHUB_TOKEN }}"
            docker pull ghcr.io/${{ github.repository }}/win-backend:latest
            docker-compose up -d --no-deps --build backend
            sleep 10
            docker-compose ps | grep backend

      - name: 8. Configurar NGINX como Reverse Proxy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/win
            chmod +x scripts/configure-nginx.sh
            ./scripts/configure-nginx.sh