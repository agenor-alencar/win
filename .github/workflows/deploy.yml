name: WIN Backend CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v3

      - name: 2. Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar o projeto com Maven (Gera o arquivo .jar)
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: 4. Login no GitHub Container Registry (Segurança)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build e Push da Imagem Docker
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/win-backend:latest

      - name: 6. Copiar arquivos de configuração para VPS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.yml,.env.example"
          target: "/root/win"
          strip_components: 1

      - name: 7. Deploy Seguro no Servidor DigitalOcean
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e  # Parar em caso de erro
            
            cd /root/win
            echo "📂 Diretório: $(pwd)"
            
            # Fazer login no GitHub Container Registry
            echo "🔐 Fazendo login no Docker Registry..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Puxar imagem mais recente
            echo "📥 Puxando imagem backend..."
            docker pull ghcr.io/${{ github.repository }}/win-backend:latest
            
            # Parar e atualizar containers
            echo "🔄 Atualizando containers..."
            docker-compose down || true
            docker-compose up -d --build
            
            # Aguardar backend inicializar
            echo "⏳ Aguardando backend (15s)..."
            sleep 15
            
            # Validar status
            echo "📊 Status dos containers:"
            docker-compose ps
            
            # Limpar
            docker image prune -f
            echo "✅ Deploy concluído com sucesso!"